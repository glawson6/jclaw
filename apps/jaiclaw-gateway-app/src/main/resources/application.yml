server:
  port: ${JAICLAW_GATEWAY_PORT:8080}

jaiclaw:
  security:
    mode: ${JAICLAW_SECURITY_MODE:api-key}
    api-key: ${JAICLAW_API_KEY:}
  identity:
    name: JaiClaw
    description: Personal AI assistant
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Default Agent
        tools:
          profile: coding
  tools:
    profile: coding
  # --- HTTP Proxy ---
  # Option 1: Set HTTP_PROXY/HTTPS_PROXY/NO_PROXY env vars (auto-detected)
  # Option 2: Explicit config below (takes precedence over env vars)
  #  http:
  #    proxy:
  #      host: ${HTTP_PROXY_HOST:}
  #      port: ${HTTP_PROXY_PORT:0}
  #      username: ${HTTP_PROXY_USERNAME:}
  #      password: ${HTTP_PROXY_PASSWORD:}
  #      non-proxy-hosts: ${NO_PROXY:localhost,127.0.0.1}
  skills:
    allow-bundled:
      - "*"
  plugins:
    enabled: true
  # --- Wizard model lists & fallback models ---
  # Override via environment variables (Spring Boot relaxed binding):
  #
  # --- Replace a single model in a list ---
  #   JAICLAW_MODELS_PROVIDERS_OPENAI_WIZARD_MODELS_0=gpt-5
  #   JAICLAW_MODELS_PROVIDERS_ANTHROPIC_WIZARD_MODELS_0=claude-next-gen
  #
  # --- Replace the entire list for a provider ---
  #   JAICLAW_MODELS_PROVIDERS_OPENAI_WIZARD_MODELS_0=gpt-5
  #   JAICLAW_MODELS_PROVIDERS_OPENAI_WIZARD_MODELS_1=gpt-5-mini
  #   (Spring replaces the full list when any indexed env var is set)
  #
  # --- Change the fallback model ---
  #   JAICLAW_MODELS_PROVIDERS_OPENAI_FALLBACK_MODEL=gpt-5-mini
  #   JAICLAW_MODELS_PROVIDERS_BEDROCK_FALLBACK_MODEL=us.anthropic.claude-4-haiku-v1:0
  #
  # --- Change the display name ---
  #   JAICLAW_MODELS_PROVIDERS_BEDROCK_DISPLAY_NAME=Amazon Bedrock
  #
  # --- Add a new provider not in YAML ---
  #   JAICLAW_MODELS_PROVIDERS_DEEPSEEK_DISPLAY_NAME=DeepSeek
  #   JAICLAW_MODELS_PROVIDERS_DEEPSEEK_FALLBACK_MODEL=deepseek-chat
  #   JAICLAW_MODELS_PROVIDERS_DEEPSEEK_WIZARD_MODELS_0=deepseek-chat
  #   JAICLAW_MODELS_PROVIDERS_DEEPSEEK_WIZARD_MODELS_1=deepseek-coder
  #
  # --- Override in application-local.yml (per-user, loaded via spring.config.import) ---
  #   jaiclaw:
  #     models:
  #       providers:
  #         openai:
  #           wizard-models: [gpt-5, gpt-5-mini, gpt-4o]
  #
  # --- Override in Docker Compose (.env file) ---
  #   JAICLAW_MODELS_PROVIDERS_ANTHROPIC_WIZARD_MODELS_0=claude-next
  #   JAICLAW_MODELS_PROVIDERS_ANTHROPIC_WIZARD_MODELS_1=claude-haiku-next
  #   JAICLAW_MODELS_PROVIDERS_ANTHROPIC_FALLBACK_MODEL=claude-haiku-next
  models:
    providers:
      openai:
        display-name: OpenAI
        fallback-model: gpt-4o-mini
        wizard-models:
          - gpt-4o
          - gpt-4o-mini
          - gpt-4.1
          - gpt-4.1-mini
          - o3-mini
      anthropic:
        display-name: Anthropic
        fallback-model: claude-haiku-4-5-20251001
        wizard-models:
          - claude-sonnet-4-6
          - claude-opus-4-6
          - claude-haiku-4-5-20251001
      bedrock:
        display-name: AWS Bedrock
        fallback-model: us.anthropic.claude-3-haiku-20240307-v1:0
        wizard-models:
          - us.anthropic.claude-3-5-sonnet-20241022-v2:0
          - us.anthropic.claude-3-haiku-20240307-v1:0
          - us.meta.llama3-1-70b-instruct-v1:0
          - amazon.nova-pro-v1:0
      ollama:
        display-name: Ollama
        wizard-models:
          - llama3
          - "llama3:70b"
          - mistral
          - codellama
          - gemma2
  mcp-servers:
    cron-manager:
      description: "Scheduled job management"
      type: http
      url: ${JAICLAW_CRON_MANAGER_URL:http://localhost:${JAICLAW_CRON_MANAGER_PORT:8090}/mcp/cron-manager}
      enabled: ${JAICLAW_CRON_MANAGER_ENABLED:false}
  channels:
    telegram:
      enabled: ${TELEGRAM_ENABLED:false}
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      webhook-url: ${TELEGRAM_WEBHOOK_URL:}
      allowed-users: ${TELEGRAM_ALLOWED_USERS:}
    email:
      enabled: ${EMAIL_ENABLED:false}
      provider: ${EMAIL_PROVIDER:imap}
      imap-host: ${EMAIL_IMAP_HOST:}
      imap-port: ${EMAIL_IMAP_PORT:993}
      smtp-host: ${EMAIL_SMTP_HOST:}
      smtp-port: ${EMAIL_SMTP_PORT:587}
      username: ${EMAIL_USERNAME:}
      password: ${EMAIL_PASSWORD:}
      poll-interval: ${EMAIL_POLL_INTERVAL:60}
    sms:
      enabled: ${SMS_ENABLED:false}
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}
      webhook-path: ${SMS_WEBHOOK_PATH:/webhooks/sms}
    slack:
      enabled: ${SLACK_ENABLED:false}
      bot-token: ${SLACK_BOT_TOKEN:}
      signing-secret: ${SLACK_SIGNING_SECRET:}
      app-token: ${SLACK_APP_TOKEN:}
    discord:
      enabled: ${DISCORD_ENABLED:false}
      bot-token: ${DISCORD_BOT_TOKEN:}
      application-id: ${DISCORD_APPLICATION_ID:}
      use-gateway: ${DISCORD_USE_GATEWAY:false}
    teams:
      enabled: ${TEAMS_ENABLED:false}
      app-id: ${TEAMS_APP_ID:}
      app-secret: ${TEAMS_APP_SECRET:}
      tenant-id: ${TEAMS_TENANT_ID:}
      skip-jwt-validation: ${TEAMS_SKIP_JWT_VALIDATION:false}
      allowed-senders: ${TEAMS_ALLOWED_SENDERS:}

spring:
  config:
    import: optional:file:${user.home}/.jaiclaw/application-local.yml
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:not-set}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    google:
      genai:
        enabled: ${GEMINI_ENABLED:false}
        api-key: ${GEMINI_API_KEY:not-set}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-2.0-flash}
    bedrock:
      converse:
        enabled: ${BEDROCK_ENABLED:false}
        chat:
          options:
            model: ${BEDROCK_MODEL:us.anthropic.claude-3-5-sonnet-20241022-v2:0}
      aws:
        region: ${AWS_REGION:us-east-1}
