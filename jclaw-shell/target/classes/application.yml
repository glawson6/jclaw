jclaw:
  identity:
    name: JClaw
    description: Personal AI assistant
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Default Agent
        model:
          primary: gpt-4o
          fallbacks:
            - gpt-4o-mini
        tools:
          profile: coding
  tools:
    profile: coding
  skills:
    allow-bundled:
      - "*"
  plugins:
    enabled: true

spring:
  main:
    web-application-type: none
  config:
    import: optional:file:${user.home}/.jclaw/application-local.yml
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:#{null}}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:#{null}}
    ollama:
      base-url: ${OLLAMA_BASE_URL:#{null}}
  shell:
    interactive:
      enabled: true
