server:
  port: ${GATEWAY_PORT:8080}

jclaw:
  identity:
    name: Code Scaffolder
    description: Project scaffolding agent with streaming output and prompt customization
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Code Scaffolder Agent
        tools:
          profile: full
        tool-loop:
          mode: spring-ai
          max-iterations: 25
  plugins:
    enabled: true

spring:
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
