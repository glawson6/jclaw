# Set GITHUB_TOKEN env var for authenticated GitHub API access (otherwise anonymous, 60 req/hr)
server:
  port: ${GATEWAY_PORT:8080}

jclaw:
  security:
    mode: ${JCLAW_SECURITY_MODE:api-key}
  identity:
    name: Code Review Bot
    description: GOAP-orchestrated code review agent
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Code Review Agent
        tools:
          profile: full
  plugins:
    enabled: true

spring:
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:not-set}
    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
