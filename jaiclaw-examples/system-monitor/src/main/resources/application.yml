server:
  port: ${GATEWAY_PORT:8080}

# ── System Monitor cron settings ──────────────────────────────────
sysmonitor:
  schedule: ${MONITOR_SCHEDULE:0 7 * * *}
  timezone: ${MONITOR_TIMEZONE:America/New_York}
  telegram:
    chat-id: ${TELEGRAM_CHAT_ID:}

# ── JaiClaw configuration ──────────────────────────────────────────
jaiclaw:
  cron:
    manager:
      enabled: true
  security:
    mode: ${JAICLAW_SECURITY_MODE:api-key}
    api-key: ${JAICLAW_API_KEY:}
  identity:
    name: System Monitor
    description: Linux system health monitoring agent with scheduled Telegram reports
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: System Monitor Agent
        tools:
          profile: minimal
  tools:
    profile: minimal
  skills:
    allow-bundled:
      - system-monitor
  plugins:
    enabled: false
  channels:
    telegram:
      enabled: ${TELEGRAM_ENABLED:true}
      bot-token: ${TELEGRAM_BOT_TOKEN:}

# ── Spring configuration ─────────────────────────────────────────
spring:
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration
  application:
    name: jaiclaw-system-monitor
  datasource:
    url: jdbc:h2:file:${user.home}/.jaiclaw/system-monitor-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:not-set}
    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    minimax:
      enabled: ${MINIMAX_ENABLED:false}
      api-key: ${MINIMAX_API_KEY:not-set}
      base-url: ${MINIMAX_BASE_URL:https://api.minimax.chat}
      chat:
        options:
          model: ${MINIMAX_MODEL:M2-her}
