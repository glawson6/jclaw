server:
  port: ${GATEWAY_PORT:8080}

jaiclaw:
  skills:
    allow-bundled: []
  identity:
    name: Research Assistant
    description: Multi-source research agent with context compaction and workspace memory
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Research Assistant Agent
        tools:
          profile: full
        tool-loop:
          mode: explicit
          max-iterations: 30
  compaction:
    enabled: true
    trigger-threshold: 50000
    target-token-percent: 50
  plugins:
    enabled: true

spring:
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
