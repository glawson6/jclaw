server:
  port: ${GATEWAY_PORT:8080}

jaiclaw:
  skills:
    allow-bundled: []
  identity:
    name: Incident Responder
    description: DevOps incident triage and remediation agent
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Incident Responder Agent
        tools:
          profile: full
        tool-loop:
          mode: explicit
          max-iterations: 15
          require-approval: true
  plugins:
    enabled: true

spring:
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
