server:
  port: ${GATEWAY_PORT:8080}

jaiclaw:
  skills:
    allow-bundled: []
  identity:
    name: DocStore Bot
    description: Telegram document storage, retrieval, and search agent
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: DocStore Agent
        tools:
          profile: full
        tool-loop:
          mode: explicit
          max-iterations: 10
  channels:
    telegram:
      enabled: true
      bot-token: ${TELEGRAM_BOT_TOKEN}
      webhook-url: ${TELEGRAM_WEBHOOK_URL:}
      allowed-users: ${TELEGRAM_ALLOWED_USERS:}
  plugins:
    enabled: true

spring:
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
