server:
  port: ${GATEWAY_PORT:8080}

# ── Agent configuration ──────────────────────────────────────────
jaiclaw:
  security:
    mode: ${JAICLAW_SECURITY_MODE:api-key}
    api-key: ${JAICLAW_API_KEY:}
  identity:
    name: OAuth Provider Demo
    description: Demonstrates OAuth login to authenticate with an AI provider before the agent can operate
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: OAuth Demo Agent
        tools:
          profile: full
        llm:
          provider: openai
          primary: ${OPENAI_MODEL:gpt-4o}
  skills:
    allow-bundled:
      - oauth-provider-demo
  plugins:
    enabled: false
  channels:
    telegram:
      enabled: false

# ── Spring AI configuration ──────────────────────────────────────
# The OpenAI API key is NOT set here — it comes from OAuth login.
# Spring AI auto-config creates a default ChatModel with a placeholder key,
# but our custom TenantChatModelFactory overrides it with the OAuth token.
spring:
  application:
    name: jaiclaw-oauth-provider-demo
  ai:
    model:
      chat: openai
    openai:
      enabled: true
      api-key: ${OPENAI_API_KEY:placeholder-replaced-by-oauth}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
