jclaw:
  security:
    mode: none
  identity:
    name: SkillCreator
    description: JClaw skill creation assistant
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Skill Creator Agent
        tools:
          profile: full
  skills:
    allow-bundled:
      - skill-creator

skill-creator:
  output-dir: ${SKILL_OUTPUT_DIR:}

spring:
  main:
    web-application-type: none
    banner-mode: "off"
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:not-set}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.1}
  shell:
    interactive:
      enabled: true
    script:
      enabled: true
