services:

  gateway:
    image: io.jclaw/jclaw-gateway-app:${JCLAW_VERSION:-0.1.0-SNAPSHOT}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      # LLM provider selection (anthropic, openai, or ollama)
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-set}
      ANTHROPIC_ENABLED: ${ANTHROPIC_ENABLED:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-not-set}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}

      # Channel adapters (all optional)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      DISCORD_USE_GATEWAY: ${DISCORD_USE_GATEWAY:-}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  ollama-data:
