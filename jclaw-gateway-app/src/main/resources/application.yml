server:
  port: ${SERVER_PORT:8080}

jclaw:
  identity:
    name: JClaw
    description: Personal AI assistant
  agent:
    default-agent: default
    agents:
      default:
        id: default
        name: Default Agent
        tools:
          profile: coding
  tools:
    profile: coding
  skills:
    allow-bundled:
      - "*"
  plugins:
    enabled: true

spring:
  config:
    import: optional:file:${user.home}/.jclaw/application-local.yml
  autoconfigure:
    exclude:
      - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration
  ai:
    model:
      chat: ${AI_PROVIDER:anthropic}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:not-set}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
